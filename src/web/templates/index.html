<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>豆瓣读书数据可视化</title>
    <link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}" />
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>豆瓣读书数据可视化</h1>
        <p>围绕书籍评分、类型、出版时间和出版社的 Web 数据管理实验展示。</p>
      </div>
      <nav class="header-actions" aria-label="页面导航">
        <a href="#charts">图表</a>
        <a href="#table">榜单</a>
      </nav>
    </header>

    <main>
      <section class="control-band" aria-label="筛选条件">
        <label>
          类型
          <select id="tagFilter">
            <option value="">全部类型</option>
            {% for tag in tags %}
            <option value="{{ tag }}">{{ tag }}</option>
            {% endfor %}
          </select>
        </label>
        <label>
          最低评分
          <input id="ratingFilter" type="range" min="0" max="10" value="0" step="0.5" />
          <span id="ratingValue">0</span>
        </label>
        <label>
          出版年份
          <select id="yearFilter">
            <option value="">全部年份</option>
            {% for year in years %}
            <option value="{{ year }}">{{ year }}</option>
            {% endfor %}
          </select>
        </label>
        <button id="resetButton" type="button">重置</button>
      </section>

      <section class="metrics" aria-label="数据概览">
        <article>
          <span>记录数</span>
          <strong id="totalMetric">0</strong>
        </article>
        <article>
          <span>平均评分</span>
          <strong id="ratingMetric">0</strong>
        </article>
        <article>
          <span>平均评价人数</span>
          <strong id="peopleMetric">0</strong>
        </article>
        <article>
          <span>出版社数量</span>
          <strong id="publisherMetric">0</strong>
        </article>
      </section>

      <section id="charts" class="chart-grid" aria-label="可视化图表">
        <div class="chart-panel">
          <h2>评分分布</h2>
          <div id="ratingChart" class="chart"></div>
        </div>
        <div class="chart-panel">
          <h2>类型分布</h2>
          <div id="tagChart" class="chart"></div>
        </div>
        <div class="chart-panel">
          <h2>出版年份趋势</h2>
          <div id="yearChart" class="chart"></div>
        </div>
        <div class="chart-panel">
          <h2>热门出版社</h2>
          <div id="publisherChart" class="chart"></div>
        </div>
        <div class="chart-panel wide">
          <h2>评分与评价人数关系</h2>
          <div id="scatterChart" class="chart"></div>
        </div>
      </section>

      <section id="table" class="table-section" aria-label="高分书籍榜单">
        <div class="section-title">
          <h2>高分书籍榜单</h2>
          <p>按评分和评价人数综合排序，点击书名可打开源网页。</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>书名</th>
                <th>作者</th>
                <th>类型</th>
                <th>评分</th>
                <th>评价人数</th>
                <th>出版社</th>
                <th>年份</th>
              </tr>
            </thead>
            <tbody id="bookTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="{{ url_for('static', path='app.js') }}"></script>
  </body>
</html>
